<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#0D1117"/>
  <!-- Hexagon outline -->
  <polygon points="32,4 58,18 58,46 32,60 6,46 6,18" fill="none" stroke="#2E7BBA" stroke-width="2.5"/>
  <!-- Hexagon inner fill -->
  <polygon points="32,12 50,22 50,42 32,52 14,42 14,22" fill="#2E7BBA" opacity="0.2"/>
  <!-- TG text -->
  <text x="32" y="38" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">TG</text>
  <!-- Bottom accent line -->
  <line x1="20" y1="48" x2="44" y2="48" stroke="#7EC8E3" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
